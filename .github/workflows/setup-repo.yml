# ==============================================================================
# WORKFLOW: Setup New Ontology (End-to-End Production Ready)
# ==============================================================================
# Purpose: Initial setup of the ontology repository. This workflow automates the
# end-to-end configuration of a new PMD application ontology using ODK.
#
# IMPORT ARCHITECTURE:
# - imports-edit.owl → imports all *_import.owl modules directly
# - {lower_id}-shared.owl → imports imports-edit.owl
# - {lower_id}-{component}.owl → imports {lower_id}-shared.owl (with annotations)
# - {lower_id}-axioms-shared.owl → imports ALL UNIQUE {lower_id}-{component}.owl files
#
# FIXES APPLIED:
# - axioms-shared.owl now imports ONLY files that actually exist (no mismatches)
# - Component names are written to a tracking file to ensure consistency
# - Component files get shared import injected AFTER all ODK operations complete
# - Proper annotations added to each component file
# - Validation step ensures all referenced files exist before ontology build
#
# Usage: Trigger via GitHub Actions with inputs.
# Assumes input files: imports.txt, components.txt, creators.txt (optional).
# ==============================================================================
name: Setup New Ontology
on:
  workflow_dispatch:
    inputs:
      ontology_id:
        description: 'Ontology ID (lowercase, e.g., autoce) - will be normalized to lowercase'
        required: true
      ontology_title:
        description: 'Ontology Title (e.g., "Automotive Components Ontology")'
        required: true
      id_digits:
        description: 'Number of digits in entity IDs (default: 7 for _0000001 to _9999999)'
        required: true
        default: '7'

jobs:
  setup_and_import:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container: obolibrary/odkfull:v1.6

    steps:
      # ========================================================================
      # STEP 1: Checkout Repository
      # ========================================================================
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ========================================================================
      # STEP 2: Configure Git
      # ========================================================================
      - name: Git Config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # ========================================================================
      # STEP 3: Install yq YAML Processor
      # ========================================================================
      - name: Install yq
        run: |
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          chmod +x /usr/bin/yq

      # ========================================================================
      # STEP 4: Configure URI Structure, ID Ranges, and Import Products
      # ========================================================================
      - name: Configure URI Structure, ID Ranges, and Import Products
        shell: bash
        run: |
          set -euo pipefail
          
          CONFIG="project-odk.yaml"
          ID="${{ github.event.inputs.ontology_id }}"
          LOWER_ID=$(echo "$ID" | tr '[:upper:]' '[:lower:]')
          TITLE="${{ github.event.inputs.ontology_title }}"
          DIGITS="${{ github.event.inputs.id_digits }}"
          
          if [ ! -f "$CONFIG" ]; then
            echo "ERROR: $CONFIG not found!"
            exit 1
          fi
          
          PREFIX=$(echo "$ID" | tr '[:lower:]' '[:upper:]')
          echo "=== Configuring Ontology: $ID (normalized: $LOWER_ID, prefix: $PREFIX) ==="
          
          ONTBASE="https://w3id.org/pmd/${LOWER_ID}"
          COMPBASE="${ONTBASE}/components"
          IMPORTBASE="${ONTBASE}/imports"
          
          # --------------------------------------------------------------------
          # 1. BASIC METADATA
          # --------------------------------------------------------------------
          yq -i ".id = \"$LOWER_ID\"" "$CONFIG"
          yq -i ".title = \"$TITLE\"" "$CONFIG"
          yq -i ".edit_ontology_file = \"src/ontology/$LOWER_ID-edit.owl\"" "$CONFIG"
          yq -i ".repo = \"$GITHUB_REPOSITORY\"" "$CONFIG"
          
          # --------------------------------------------------------------------
          # 2. URI STRUCTURE
          # --------------------------------------------------------------------
          yq -i ".uribase = \"https://w3id.org/pmd\"" "$CONFIG"
          yq -i ".uribase_suffix = \"$LOWER_ID\"" "$CONFIG"
          yq -i ".preferredPrefix = \"$PREFIX\"" "$CONFIG"
          
          # --------------------------------------------------------------------
          # 3. NAMESPACES
          # --------------------------------------------------------------------
          yq -i ".namespaces = [\"${ONTBASE}/\"]" "$CONFIG"
          
          # --------------------------------------------------------------------
          # 4. CI/CD & ARRAYS
          # --------------------------------------------------------------------
          yq -i ".ci = []" "$CONFIG"
          yq -i '.components.products = (.components.products // [])' "$CONFIG"
          yq -i '.import_group.products = (.import_group.products // [])' "$CONFIG"
          yq -i '.idranges = (.idranges // [])' "$CONFIG"
          
          # ------------------------------------------------------------------
          # 4a. CORE SHARED COMPONENT REGISTRATION
          # ------------------------------------------------------------------
          SHARED_COMPONENTS=("imports-edit.owl" "${LOWER_ID}-shared.owl" "${LOWER_ID}-axioms-shared.owl")
          for shared_file in "${SHARED_COMPONENTS[@]}"; do
            export SHARED_FILE="$shared_file"
            export SHARED_IRI="${COMPBASE}/${shared_file}"
            exists=$(yq e '.components.products | map(select(.filename == env(SHARED_FILE))) | length' "$CONFIG")
            if [ "${exists:-0}" -eq 0 ]; then
              yq -i '.components.products += [{"filename": env(SHARED_FILE), "base_iris": [env(SHARED_IRI)]}]' "$CONFIG"
              echo "  Registered shared component: $shared_file"
            fi
          done
          
          # --------------------------------------------------------------------
          # 5. COMPONENT PRODUCTS (with {lower_id}-{component}.owl naming)
          # FIX: Use associative array to ensure unique component names
          # FIX: Write processed names to tracking file for consistency
          # --------------------------------------------------------------------
          sanitize_component_name() {
            local raw="$1"
            local trimmed
            # Remove carriage returns and trim whitespace
            trimmed=$(echo "$raw" | tr -d '\r' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')
            if [ -z "$trimmed" ]; then
              echo ""
              return
            fi
            # Remove hidden unicode characters (zero-width spaces, non-breaking spaces)
            # Using hex codes for portability
            trimmed=$(echo "$trimmed" | sed 's/\xe2\x80\x8b//g; s/\xc2\xa0/ /g')
            # Keep only alphanumeric, dot, underscore, hyphen
            echo "$trimmed" | LC_ALL=C tr -cd 'A-Za-z0-9._-'
          }
          
          declare -A seen_components
          component_list=()
          
          add_component() {
            local name="$1"
            if [ -z "$name" ]; then return; fi
            if [ -n "${seen_components[$name]+x}" ]; then
              echo "  Skipping duplicate component: $name"
              return
            fi
            seen_components["$name"]=1
            component_list+=("$name")
          }
          
          if [ -f "component_seeds.txt" ]; then
            echo "Processing components from component_seeds.txt..."
            while IFS='|' read -r raw_comp _rest || [ -n "$raw_comp" ]; do
              raw_comp=$(echo "$raw_comp" | xargs 2>/dev/null || echo "$raw_comp")
              if [ -z "$raw_comp" ] || echo "$raw_comp" | grep -qE '^\s*#'; then continue; fi
              comp_name=$(sanitize_component_name "$raw_comp")
              if [ -n "$comp_name" ]; then
                add_component "$comp_name"
              fi
            done < component_seeds.txt
          fi
          
          if [ -f "components.txt" ]; then
            echo "Processing components from components.txt..."
            while IFS= read -r raw_comp || [ -n "$raw_comp" ]; do
              raw_comp=$(echo "$raw_comp" | xargs 2>/dev/null || echo "$raw_comp")
              if [ -z "$raw_comp" ] || echo "$raw_comp" | grep -qE '^\s*#'; then continue; fi
              comp_name=$(sanitize_component_name "$raw_comp")
              if [ -n "$comp_name" ]; then
                add_component "$comp_name"
              fi
            done < components.txt
          fi
          
          echo "  Found ${#component_list[@]} unique components: ${component_list[*]}"
          
          # CRITICAL FIX: Write processed component names to tracking file
          # This ensures Step 11 uses the EXACT SAME names as registered in ODK config
          mkdir -p .workflow-temp
          printf '%s\n' "${component_list[@]}" > .workflow-temp/processed_components.txt
          echo "  Wrote component names to tracking file"
          
          for comp_name in "${component_list[@]}"; do
            export COMP_FILENAME="${LOWER_ID}-${comp_name}.owl"
            export COMP_IRI="${COMPBASE}/${LOWER_ID}-${comp_name}.owl"
            exists=$(yq e '.components.products | map(select(.filename == env(COMP_FILENAME))) | length' "$CONFIG")
            if [ "${exists:-0}" -eq 0 ]; then
              yq -i '.components.products += [{"filename": env(COMP_FILENAME), "base_iris": [env(COMP_IRI)]}]' "$CONFIG"
              echo "  Registered component: ${LOWER_ID}-${comp_name}.owl"
            fi
          done
          
          # --------------------------------------------------------------------
          # 6. ID RANGES CONFIGURATION
          # --------------------------------------------------------------------
          if [ -f "creators.txt" ]; then
            echo "Processing ID ranges from creators.txt..."
            ID_PREFIX="${ONTBASE}/${PREFIX}_"
            BLOCK_SIZE=10000
            nl -ba creators.txt | while IFS=$'\t' read -r idx line || [ -n "$idx" ]; do
              idx=$(echo "$idx" | xargs)
              clean_line=$(echo "$line" | sed 's/^\s*#.*$//' | xargs)
              if [ -z "$clean_line" ]; then continue; fi
              creator="$clean_line"
              RANGE_START=$(( (idx - 1) * BLOCK_SIZE ))
              RANGE_END=$(( RANGE_START + BLOCK_SIZE - 1 ))
              export ALLOCATED_TO="$creator"
              export IDS_FOR="$LOWER_ID"
              export ID_PREFIX_VAR="$ID_PREFIX"
              export ID_DIGITS_VAR="$DIGITS"
              export R_START="$RANGE_START"
              export R_END="$RANGE_END"
              yq -i '.idranges += [{
                "allocatedto": env(ALLOCATED_TO),
                "idsfor": env(IDS_FOR),
                "idprefix": env(ID_PREFIX_VAR),
                "iddigits": env(ID_DIGITS_VAR),
                "range_start": env(R_START),
                "range_end": env(R_END)
              }]' "$CONFIG"
              echo "  Allocated range $RANGE_START-$RANGE_END to: $creator"
            done
          else
            echo "No creators.txt found - no ID ranges added."
          fi
          
          # --------------------------------------------------------------------
          # 7. IMPORT PRODUCTS
          # --------------------------------------------------------------------
          echo "Configuring import products..."
          
          exists_pmdco=$(yq e '.import_group.products | map(select(.id == "pmdco")) | length' "$CONFIG")
          if [ "${exists_pmdco:-0}" -eq 0 ]; then
            yq -i '.import_group.products += [{
              "id": "pmdco",
              "title": "PMD Core Ontology",
              "mirror_from": "https://raw.githubusercontent.com/materialdigital/core-ontology/refs/heads/main/pmdco-full.owl",
              "module_type": "slme",
              "base_iris": ["https://w3id.org/pmd/co/"]
            }]' "$CONFIG"
          fi
          echo "  Added core import: pmdco (SLME extraction)"
          
          # Also write import IDs to tracking file for consistency
          echo "pmdco" > .workflow-temp/processed_imports.txt
          
          if [ -f "imports.txt" ]; then
            while IFS='|' read -r import_id import_url || [ -n "$import_id" ]; do
              if echo "$import_id" | grep -qE '^\s*#'; then continue; fi
              import_id=$(echo "${import_id:-}" | xargs | tr '[:upper:]' '[:lower:]')
              import_url=$(echo "${import_url:-}" | xargs)
              if [ -z "$import_id" ] || [ -z "$import_url" ]; then continue; fi
              echo "  - Adding import: $import_id from $import_url"
              echo "$import_id" >> .workflow-temp/processed_imports.txt
              export IMPORT_ID="$import_id"
              export IMPORT_URL="$import_url"
              exists=$(yq e '.import_group.products | map(select(.id == env(IMPORT_ID))) | length' "$CONFIG")
              if [ "${exists:-0}" -eq 0 ]; then
                yq -i '.import_group.products += [{
                  "id": env(IMPORT_ID),
                  "mirror_from": env(IMPORT_URL),
                  "module_type": "slme"
                }]' "$CONFIG"
              fi
            done < imports.txt
          else
            echo "No imports.txt found - only PMD Core added."
          fi
          
          yq -i '.import_group.products |= unique_by(.id)' "$CONFIG"
          yq -i '.components.products |= unique_by(.filename)' "$CONFIG"
          
          echo "=== Configuration Complete ==="

      # ========================================================================
      # STEP 5: Run ODK Seed
      # ========================================================================
      - name: Run ODK Seed
        shell: bash
        run: |
          set -euo pipefail
          echo "Running ODK seed..."
          /tools/odk.py seed -c -C project-odk.yaml \
            --gitname "${{ github.actor }}" \
            --gitemail "${{ github.actor }}@users.noreply.github.com"

      # ========================================================================
      # STEP 6: Move Generated Files
      # ========================================================================
      - name: Move Generated Files
        shell: bash
        run: |
          set -euo pipefail
          ID="${{ github.event.inputs.ontology_id }}"
          LOWER_ID=$(echo "$ID" | tr '[:upper:]' '[:lower:]')
          TARGET_DIR="target/$LOWER_ID"
          
          if [ ! -d "$TARGET_DIR" ]; then
            echo "ERROR: Target directory $TARGET_DIR not found!"
            exit 1
          fi
          
          rm -rf "$TARGET_DIR/.github"
          cp -r "$TARGET_DIR"/* .
          if [ -f "$TARGET_DIR/.gitignore" ]; then cp "$TARGET_DIR/.gitignore" .; fi
          rm -rf target/
          echo "Files moved from $TARGET_DIR to root."

      # ========================================================================
      # STEP 6.5: Ensure README Interpolation
      # ========================================================================
      - name: Ensure README Interpolation
        shell: bash
        run: |
          set -euo pipefail
          LOWER_ID=$(echo "${{ github.event.inputs.ontology_id }}" | tr '[:upper:]' '[:lower:]')
          TITLE="${{ github.event.inputs.ontology_title }}"
          if [ -f "README.md" ]; then
            sed -i "s|Placeholder Title|$TITLE|g" README.md
            sed -i "s|placeholder_id|$LOWER_ID|g" README.md
            echo "README interpolated."
          fi

      # ========================================================================
      # STEP 6.7: Customize README
      # ========================================================================
      - name: Customize README
        shell: bash
        run: |
          set -euo pipefail
          LOWER_ID=$(echo "${{ github.event.inputs.ontology_id }}" | tr '[:upper:]' '[:lower:]')
          UPPER_ID=$(echo "${{ github.event.inputs.ontology_id }}" | tr '[:lower:]' '[:upper:]')
          TITLE="${{ github.event.inputs.ontology_title }}"
          REPO="${{ github.repository }}"
          
          if [ ! -f "README.md" ]; then
            echo "ERROR: README.md not found!"
            exit 1
          fi
          
          echo "" >> README.md
          
          cat >> README.md << EOF
          ## Development
          This ontology is developed using OWL and managed with the [Ontology Development Kit (ODK)](https://github.com/INCATools/ontology-development-kit). To edit:
          - Open \`${LOWER_ID}-edit.owl\` in [Protégé](https://protege.stanford.edu/).
          - Create new entities within the namespace \`https://w3id.org/pmd/${LOWER_ID}/\`.
          - Use the \`Makefile\` for automation (\`make test\`, \`make refresh-imports\`, \`make release\`).

          ### Top-level directories
          **.github/:** GitHub configuration files, including CI workflows and templates.
          **src/:** Main development folder generated and managed through ODK.
          **ontology/components/:** – Modular ontology components (classes, properties, axioms).
          **ontology/pmdco-edit.owl:** – Primary editable ontology file used during development (ontology editors' version).
          
          ## Import Architecture
          \`\`\`
          imports-edit.owl
              └── imports all *_import.owl modules (pmdco_import.owl, etc.)
          
          ${LOWER_ID}-shared.owl
              └── imports imports-edit.owl
          
          ${LOWER_ID}-{component}.owl (each component)
              └── imports ${LOWER_ID}-shared.owl
          
          ${LOWER_ID}-axioms-shared.owl
              └── imports ALL ${LOWER_ID}-{component}.owl files
          \`\`\`
          
          ## Contribution
          We welcome contributions! Please use the [Issue tracker](https://github.com/${REPO}/issues).
          EOF
          
          echo "README customized."

      # ========================================================================
      # STEP 7: Generate ID Ranges OWL File
      # ========================================================================
      - name: Generate ID Ranges OWL File
        shell: bash
        run: |
          set -euo pipefail
          ID="${{ github.event.inputs.ontology_id }}"
          LOWER_ID=$(echo "$ID" | tr '[:upper:]' '[:lower:]')
          DIGITS="${{ github.event.inputs.id_digits }}"
          PREFIX_UPPER=$(echo "$ID" | tr '[:lower:]' '[:upper:]')
          ID_PREFIX="https://w3id.org/pmd/$LOWER_ID/${PREFIX_UPPER}_"
          IDRANGE_FILE="src/ontology/${LOWER_ID}-idranges.owl"
          CREATORS_FILE="creators.txt"
          
          if [ ! -f "$CREATORS_FILE" ]; then
            echo "No creators.txt found - skipping ID ranges generation."
            exit 0
          fi
          
          mkdir -p "src/ontology"
          
          {
            echo "Prefix: rdf: <http://www.w3.org/1999/02/22-rdf-syntax-ns#>"
            echo "Prefix: xsd: <http://www.w3.org/2001/XMLSchema#>"
            echo "Prefix: owl: <http://www.w3.org/2002/07/owl#>"
            echo "Prefix: rdfs: <http://www.w3.org/2000/01/rdf-schema#>"
            echo "Prefix: xml: <http://www.w3.org/XML/1998/namespace>"
            echo "Prefix: dce: <http://purl.org/dc/elements/1.1/>"
            echo "Prefix: allocatedto: <http://purl.obolibrary.org/obo/IAO_0000597>"
            echo "Prefix: idsfor: <http://purl.obolibrary.org/obo/IAO_0000598>"
            echo "Prefix: idprefix: <http://purl.obolibrary.org/obo/IAO_0000599>"
            echo "Prefix: iddigits: <http://purl.obolibrary.org/obo/IAO_0000596>"
            echo "Prefix: idrange: <http://purl.obolibrary.org/obo/ro/idrange/>"
            echo ""
            echo "Ontology: <https://w3id.org/pmd/$LOWER_ID/${LOWER_ID}-idranges.owl>"
            echo ""
            echo "Annotations:"
            echo "    idsfor: \"$PREFIX_UPPER\","
            echo "    idprefix: \"$ID_PREFIX\","
            echo "    iddigits: $DIGITS"
            echo ""
            echo "AnnotationProperty: allocatedto:"
            echo ""
            echo "AnnotationProperty: idsfor:"
            echo ""
            echo "AnnotationProperty: idprefix:"
            echo ""
            echo "AnnotationProperty: iddigits:"
            echo ""
          } > "$IDRANGE_FILE"
          
          BLOCK_SIZE=10000
          nl -ba "$CREATORS_FILE" | while IFS=$'\t' read -r idx line || [ -n "$idx" ]; do
            idx=$(echo "$idx" | xargs)
            clean_line=$(echo "$line" | sed 's/^\s*#.*$//' | xargs)
            if [ -z "$clean_line" ]; then continue; fi
            RANGE_START=$(( (idx - 1) * BLOCK_SIZE ))
            RANGE_END=$(( RANGE_START + BLOCK_SIZE - 1 ))
            {
              echo "Datatype: idrange:$idx"
              echo "    Annotations:"
              echo "        allocatedto: \"$clean_line\""
              echo "    EquivalentTo:"
              echo "        xsd:integer[>= $RANGE_START , <= $RANGE_END]"
              echo ""
            } >> "$IDRANGE_FILE"
            echo "  Added range $RANGE_START-$RANGE_END for: $clean_line"
          done
          
          {
            echo "Datatype: xsd:integer"
            echo "Datatype: rdf:PlainLiteral"
          } >> "$IDRANGE_FILE"
          
          echo "ID Ranges file generated: $IDRANGE_FILE"

      # ========================================================================
      # STEP 8: Setup Import Terms Files
      # ========================================================================
      - name: Setup Import Terms Files
        shell: bash
        run: |
          set -euo pipefail
          IMPORTS_DIR="src/ontology/imports"
          mkdir -p "$IMPORTS_DIR"
          
          process_terms_file() {
            local onto_id=$1
            local custom_source="${onto_id^^}-terms.txt"
            local standard_source="${onto_id}_terms.txt"
            local target_file="$IMPORTS_DIR/${onto_id}_terms.txt"
            
            if [ -f "$custom_source" ]; then
              echo "  - Found custom terms file: $custom_source"
              cp "$custom_source" "$target_file"
            elif [ -f "$standard_source" ]; then
              echo "  - Found standard terms file: $standard_source"
              cp "$standard_source" "$target_file"
            else
              echo "  - Creating empty placeholder for $onto_id"
              {
                echo "# Terms to import from $onto_id ontology (SLME extraction)"
                echo "# Format: One IRI per line"
              } > "$target_file"
            fi
          }
          
          echo "Processing PMD Core terms..."
          process_terms_file "pmdco"
          
          if [ -f "imports.txt" ]; then
            while IFS='|' read -r import_id import_url || [ -n "$import_id" ]; do
              if echo "$import_id" | grep -qE '^\s*#'; then continue; fi
              import_id=$(echo "${import_id:-}" | xargs | tr '[:upper:]' '[:lower:]')
              if [ -n "$import_id" ]; then
                echo "Processing terms for $import_id..."
                process_terms_file "$import_id"
              fi
            done < imports.txt
          fi
          
          echo "Terms files setup complete."

      # ========================================================================
      # STEP 9: Create Stub Import Modules
      # ========================================================================
      - name: Create Stub Import Modules
        shell: bash
        run: |
          set -euo pipefail
          ID="${{ github.event.inputs.ontology_id }}"
          LOWER_ID=$(echo "$ID" | tr '[:upper:]' '[:lower:]')
          ONTBASE="https://w3id.org/pmd/${LOWER_ID}"
          IMPORTBASE="${ONTBASE}/imports"
          
          mkdir -p src/ontology/imports
          
          # Read import IDs from tracking file (ensures consistency with Step 4)
          IMPORT_IDS=()
          if [ -f ".workflow-temp/processed_imports.txt" ]; then
            while IFS= read -r iid || [ -n "$iid" ]; do
              iid=$(echo "$iid" | xargs)
              if [ -n "$iid" ]; then
                IMPORT_IDS+=("$iid")
              fi
            done < .workflow-temp/processed_imports.txt
          else
            # Fallback: read from imports.txt
            IMPORT_IDS=("pmdco")
            if [ -f "imports.txt" ]; then
              while IFS='|' read -r import_id _url || [ -n "$import_id" ]; do
                echo "$import_id" | grep -qE '^\s*#' && continue
                import_id=$(echo "${import_id:-}" | xargs | tr '[:upper:]' '[:lower:]')
                [ -z "$import_id" ] && continue
                IMPORT_IDS+=("$import_id")
              done < imports.txt
            fi
          fi
          
          for iid in "${IMPORT_IDS[@]}"; do
            STUB_FILE="src/ontology/imports/${iid}_import.owl"
            if [ ! -f "$STUB_FILE" ]; then
              cat > "$STUB_FILE" << STUBEOF
          Prefix(:=<${ONTBASE}/>)
          Prefix(owl:=<http://www.w3.org/2002/07/owl#>)

          Ontology(<${IMPORTBASE}/${iid}_import.owl>)
          STUBEOF
              echo "  Created stub: ${iid}_import.owl"
            fi
          done

          echo "Stub import modules created."

      # ========================================================================
      # STEP 10: Patch Catalog
      # ========================================================================
      - name: Patch Catalog
        shell: bash
        run: |
          set -euo pipefail
          ID="${{ github.event.inputs.ontology_id }}"
          LOWER_ID=$(echo "$ID" | tr '[:upper:]' '[:lower:]')
          CATALOG="src/ontology/catalog-v001.xml"
          ONTBASE="https://w3id.org/pmd/${LOWER_ID}"
          
          if [ ! -f "$CATALOG" ]; then
            echo "ERROR: $CATALOG not found"
            exit 1
          fi
          
          python3 << PYEOF
          import xml.etree.ElementTree as ET
          from pathlib import Path

          catalog_path = Path("$CATALOG")
          base = "$ONTBASE"

          ns_uri = "urn:oasis:names:tc:entity:xmlns:xml:catalog"
          ET.register_namespace("", ns_uri)

          tree = ET.parse(catalog_path)
          root = tree.getroot()

          rewrites = [
              (f"{base}/imports/", "imports/"),
              (f"{base}/components/", "components/"),
          ]

          existing_starts = set()
          for elem in root.findall(f"{{{ns_uri}}}rewriteURI"):
              existing_starts.add(elem.get("uriStartString"))

          insert_position = 0
          for uri_start, rewrite_prefix in rewrites:
              if uri_start not in existing_starts:
                  new_elem = ET.Element(f"{{{ns_uri}}}rewriteURI")
                  new_elem.set("uriStartString", uri_start)
                  new_elem.set("rewritePrefix", rewrite_prefix)
                  root.insert(insert_position, new_elem)
                  insert_position += 1
                  print(f"  Added rewriteURI: {uri_start} -> {rewrite_prefix}")

          tree.write(catalog_path, encoding="UTF-8", xml_declaration=True)
          print("Catalog patched successfully.")
          PYEOF

      # ========================================================================
      # STEP 11: Create Shared Component Files
      # CRITICAL FIX: Read component names from tracking file created in Step 4
      # This ensures axioms-shared.owl imports EXACTLY what ODK config registered
      # ========================================================================
      - name: Create Shared Component Files
        shell: bash
        run: |
          set -euo pipefail
          ID="${{ github.event.inputs.ontology_id }}"
          LOWER_ID=$(echo "$ID" | tr '[:upper:]' '[:lower:]')
          ONTBASE="https://w3id.org/pmd/${LOWER_ID}"
          COMPBASE="${ONTBASE}/components"
          IMPORTBASE="${ONTBASE}/imports"
          
          mkdir -p src/ontology/components
          
          # Use Python to handle all file generation with consistent naming
          python3 << PYEOF
          import re
          from pathlib import Path

          lower_id = "$LOWER_ID"
          ontbase = "$ONTBASE"
          compbase = "$COMPBASE"
          importbase = "$IMPORTBASE"

          component_dir = Path("src/ontology/components")
          component_dir.mkdir(parents=True, exist_ok=True)

          # Standard prefixes for OWL files
          prefixes = f"""Prefix(:=<{ontbase}/>)
          Prefix(owl:=<http://www.w3.org/2002/07/owl#>)
          Prefix(rdf:=<http://www.w3.org/1999/02/22-rdf-syntax-ns#>)
          Prefix(xml:=<http://www.w3.org/XML/1998/namespace>)
          Prefix(xsd:=<http://www.w3.org/2001/XMLSchema#>)
          Prefix(rdfs:=<http://www.w3.org/2000/01/rdf-schema#>)
          """

          # ----------------------------------------------------------------
          # 1. Read import IDs from tracking file (ensures consistency)
          # ----------------------------------------------------------------
          import_ids = []
          tracking_imports = Path(".workflow-temp/processed_imports.txt")
          if tracking_imports.exists():
              print("  Reading imports from tracking file...")
              for line in tracking_imports.read_text().splitlines():
                  line = line.strip()
                  if line and line not in import_ids:
                      import_ids.append(line)
          else:
              # Fallback: read from imports.txt
              print("  Tracking file not found, falling back to imports.txt...")
              import_ids = ["pmdco"]
              imports_file = Path("imports.txt")
              if imports_file.exists():
                  for line in imports_file.read_text().splitlines():
                      line = line.strip()
                      if not line or line.startswith("#"):
                          continue
                      parts = line.split("|")
                      if parts:
                          import_id = parts[0].strip().lower()
                          if import_id and import_id not in import_ids:
                              import_ids.append(import_id)

          print(f"  Import IDs: {import_ids}")

          # Build import statements for imports-edit.owl
          import_statements = "\n".join([f"Import(<{importbase}/{iid}_import.owl>)" for iid in import_ids])

          # ----------------------------------------------------------------
          # 2. Create imports-edit.owl
          # ----------------------------------------------------------------
          imports_edit_content = f"""{prefixes}
          Ontology(<{compbase}/imports-edit.owl>
          {import_statements}
          )
          """
          (component_dir / "imports-edit.owl").write_text(imports_edit_content, encoding="utf-8")
          print(f"  Created imports-edit.owl with {len(import_ids)} imports")

          # ----------------------------------------------------------------
          # 3. Create {lower_id}-shared.owl
          # ----------------------------------------------------------------
          shared_content = f"""{prefixes}
          Ontology(<{compbase}/{lower_id}-shared.owl>
          Import(<{compbase}/imports-edit.owl>)
          )
          """
          (component_dir / f"{lower_id}-shared.owl").write_text(shared_content, encoding="utf-8")
          print(f"  Created {lower_id}-shared.owl")

          # ----------------------------------------------------------------
          # 4. Read UNIQUE component names from tracking file
          # CRITICAL: This must match exactly what was registered in ODK config
          # ----------------------------------------------------------------
          unique_components = []
          tracking_file = Path(".workflow-temp/processed_components.txt")
          
          if tracking_file.exists():
              print("  Reading component names from tracking file (ensures consistency)...")
              for line in tracking_file.read_text().splitlines():
                  comp_name = line.strip()
                  if comp_name and comp_name not in unique_components:
                      unique_components.append(comp_name)
              print(f"  Found {len(unique_components)} components from tracking file")
          else:
              # Fallback: scan existing component files in the directory
              print("  Tracking file not found, scanning component directory...")
              skip_patterns = {"imports-edit.owl", f"{lower_id}-shared.owl", f"{lower_id}-axioms-shared.owl"}
              
              for owl_file in sorted(component_dir.glob(f"{lower_id}-*.owl")):
                  filename = owl_file.name
                  if filename in skip_patterns:
                      continue
                  # Extract component name: {lower_id}-{component}.owl -> component
                  if filename.startswith(f"{lower_id}-") and filename.endswith(".owl"):
                      comp_name = filename[len(f"{lower_id}-"):-4]
                      if comp_name and comp_name != "shared" and "axioms-shared" not in comp_name:
                          if comp_name not in unique_components:
                              unique_components.append(comp_name)
                              print(f"    Found component file: {filename}")

          print(f"  Final component list ({len(unique_components)}): {unique_components}")

          # Build import statements for axioms-shared.owl
          axiom_imports = "\n".join([f"Import(<{compbase}/{lower_id}-{comp}.owl>)" for comp in unique_components])

          # ----------------------------------------------------------------
          # 5. Create {lower_id}-axioms-shared.owl (imports ALL UNIQUE components)
          # ----------------------------------------------------------------
          axioms_content = f"""{prefixes}
          Ontology(<{compbase}/{lower_id}-axioms-shared.owl>
          {axiom_imports}
          )
          """
          (component_dir / f"{lower_id}-axioms-shared.owl").write_text(axioms_content, encoding="utf-8")
          print(f"  Created {lower_id}-axioms-shared.owl with {len(unique_components)} component imports")

          print("Shared component files created successfully.")
          PYEOF

      # ========================================================================
      # STEP 12: Normalize Double Slashes
      # ========================================================================
      - name: Normalize Double Slashes
        shell: bash
        run: |
          set -euo pipefail
          ID="${{ github.event.inputs.ontology_id }}"
          LOWER_ID=$(echo "$ID" | tr '[:upper:]' '[:lower:]')
          
          echo "Normalizing any double slashes in OWL files..."
          
          find src/ontology -name "*.owl" -type f | while read -r file; do
            if grep -q "https://w3id.org/pmd/${LOWER_ID}//" "$file" 2>/dev/null; then
              sed -i "s|https://w3id.org/pmd/${LOWER_ID}//|https://w3id.org/pmd/${LOWER_ID}/|g" "$file"
              echo "  Fixed double slashes in: $file"
            fi
          done
          
          echo "Double slash normalization complete."

      # ========================================================================
      # STEP 12.5: Validate Component File Consistency
      # CRITICAL: Ensures all files referenced in axioms-shared.owl actually exist
      # ========================================================================
      - name: Validate Component File Consistency
        shell: bash
        run: |
          set -euo pipefail
          ID="${{ github.event.inputs.ontology_id }}"
          LOWER_ID=$(echo "$ID" | tr '[:upper:]' '[:lower:]')
          COMPONENT_DIR="src/ontology/components"
          AXIOMS_FILE="$COMPONENT_DIR/${LOWER_ID}-axioms-shared.owl"
          
          echo "=== Validating Component File Consistency ==="
          
          if [ ! -f "$AXIOMS_FILE" ]; then
            echo "ERROR: axioms-shared.owl not found!"
            exit 1
          fi
          
          # Extract all Import statements from axioms-shared.owl
          MISSING_FILES=()
          while IFS= read -r line; do
            # Extract filename from Import(<.../{lower_id}-{component}.owl>)
            if [[ "$line" =~ Import\(\<.*components/${LOWER_ID}-([^.]+)\.owl\>\) ]]; then
              comp_name="${BASH_REMATCH[1]}"
              expected_file="$COMPONENT_DIR/${LOWER_ID}-${comp_name}.owl"
              if [ ! -f "$expected_file" ]; then
                echo "  WARNING: Missing component file: $expected_file"
                MISSING_FILES+=("$comp_name")
              else
                echo "  OK: $expected_file exists"
              fi
            fi
          done < "$AXIOMS_FILE"
          
          # If there are missing files, create stub files for them
          if [ ${#MISSING_FILES[@]} -gt 0 ]; then
            echo ""
            echo "Creating stub files for ${#MISSING_FILES[@]} missing components..."
            
            ONTBASE="https://w3id.org/pmd/${LOWER_ID}"
            COMPBASE="${ONTBASE}/components"
            SHARED_IRI="${COMPBASE}/${LOWER_ID}-shared.owl"
            
            for comp_name in "${MISSING_FILES[@]}"; do
              STUB_FILE="$COMPONENT_DIR/${LOWER_ID}-${comp_name}.owl"
              PRETTY_NAME=$(echo "$comp_name" | tr '_' ' ' | sed 's/.*/\u&/')
              UPPER_ID=$(echo "$ID" | tr '[:lower:]' '[:upper:]')
              
              cat > "$STUB_FILE" << STUBEOF
          Prefix(:=<${ONTBASE}/>)
          Prefix(owl:=<http://www.w3.org/2002/07/owl#>)
          Prefix(rdf:=<http://www.w3.org/1999/02/22-rdf-syntax-ns#>)
          Prefix(xml:=<http://www.w3.org/XML/1998/namespace>)
          Prefix(xsd:=<http://www.w3.org/2001/XMLSchema#>)
          Prefix(rdfs:=<http://www.w3.org/2000/01/rdf-schema#>)

          Ontology(<${COMPBASE}/${LOWER_ID}-${comp_name}.owl>
          Import(<${SHARED_IRI}>)
          Annotation(<http://purl.org/dc/terms/title> "${UPPER_ID} - ${PRETTY_NAME} Module"@en)
          Annotation(<http://www.w3.org/2000/01/rdf-schema#comment> "The ${comp_name} module of the ${UPPER_ID} Ontology."@en)
          )
          STUBEOF
              echo "  Created stub: ${LOWER_ID}-${comp_name}.owl"
            done
          fi
          
          echo ""
          echo "=== Validation Complete ==="
          
          # List all component files for verification
          echo "Component files in directory:"
          ls -la "$COMPONENT_DIR/"

      # ========================================================================
      # STEP 13: Refresh Imports
      # ========================================================================
      - name: Refresh Imports
        shell: bash
        run: |
          set -euo pipefail
          echo "Refreshing imports with SLME extraction..."
          cd src/ontology
          
          echo "=== Catalog contents ==="
          cat catalog-v001.xml
          echo ""
          echo "=== Import files ==="
          ls -la imports/
          echo ""
          echo "=== Component files ==="
          ls -la components/
          echo "========================"
          
          make refresh-imports IMP=true MIR=true ROBOT_ENV='ROBOT_JAVA_ARGS=-Xmx8G'
          echo "Imports refreshed successfully."

      # ========================================================================
      # STEP 14: Initialize Component Templates
      # ========================================================================
      - name: Initialize Component Templates
        shell: bash
        run: |
          set -euo pipefail
          ID="${{ github.event.inputs.ontology_id }}"
          LOWER_ID=$(echo "$ID" | tr '[:upper:]' '[:lower:]')
          INTERNAL_CONFIG="src/ontology/${LOWER_ID}-odk.yaml"
          
          mkdir -p src/templates
          mkdir -p src/ontology/config
          
          if [ ! -f "src/ontology/config/context.json" ]; then
            cat > src/ontology/config/context.json << CTXEOF
          {
            "@context": {
              "$LOWER_ID": "https://w3id.org/pmd/$LOWER_ID/",
              "pmdco": "https://w3id.org/pmd/co/",
              "rdf": "http://www.w3.org/1999/02/22-rdf-syntax-ns#",
              "rdfs": "http://www.w3.org/2000/01/rdf-schema#",
              "owl": "http://www.w3.org/2002/07/owl#"
            }
          }
          CTXEOF
          fi
          
          # Use Python for robust template generation
          python3 << PYEOF
          import re
          from pathlib import Path

          lower_id = "$LOWER_ID"
          internal_config = "$INTERNAL_CONFIG"

          def sanitize_name(raw):
              if not raw:
                  return ""
              raw = raw.replace('\u200b', '').replace('\xa0', ' ')
              raw = raw.strip()
              return re.sub(r'[^A-Za-z0-9._-]', '', raw)

          seeds_file = Path("component_seeds.txt")
          if not seeds_file.exists():
              print("No component_seeds.txt found - skipping template generation.")
              exit(0)

          templates_dir = Path("src/templates")
          templates_dir.mkdir(parents=True, exist_ok=True)

          # Parse seeds and group by component name
          component_rows = {}
          for line in seeds_file.read_text().splitlines():
              line = line.strip()
              if not line or line.startswith("#"):
                  continue
              parts = line.split("|")
              if len(parts) >= 1:
                  comp_name = sanitize_name(parts[0])
                  if not comp_name:
                      continue
                  if comp_name not in component_rows:
                      component_rows[comp_name] = []
                  if len(parts) >= 4:
                      component_rows[comp_name].append({
                          'id': parts[1].strip() if len(parts) > 1 else '',
                          'label': parts[2].strip() if len(parts) > 2 else '',
                          'parent': parts[3].strip() if len(parts) > 3 else ''
                      })

          print(f"Found {len(component_rows)} unique components for templates")

          for comp_name, rows in component_rows.items():
              tsv_file = templates_dir / f"{lower_id}-{comp_name}.tsv"
              if not tsv_file.exists():
                  lines = ["ID\tLabel\tParent Class", "ID\tA rdfs:label\tSC %"]
                  for row in rows:
                      if row['id']:
                          lines.append(f"{row['id']}\t{row['label']}\t{row['parent']}")
                  tsv_file.write_text("\n".join(lines) + "\n", encoding="utf-8")
                  print(f"  Created template: {tsv_file.name}")

          print("Template generation complete.")
          PYEOF
          
          # Update repo if templates were created
          if [ -d "src/templates" ] && [ "$(ls -A src/templates 2>/dev/null)" ]; then
            echo "Regenerating repository structure..."
            cd src/ontology
            make update_repo 2>/dev/null || true
            echo "Makefile updated."
          fi

      # ========================================================================
      # STEP 15: Remove Root Class
      # ========================================================================
      - name: Remove Root Class
        shell: bash
        run: |
          set -euo pipefail
          ID="${{ github.event.inputs.ontology_id }}"
          LOWER_ID=$(echo "$ID" | tr '[:upper:]' '[:lower:]')
          PREFIX=$(echo "$ID" | tr '[:lower:]' '[:upper:]')
          EDIT_FILE="src/ontology/${LOWER_ID}-edit.owl"
          
          if [ -f "$EDIT_FILE" ]; then
            sed -i "/${PREFIX}_0000000/d" "$EDIT_FILE"
            sed -i '/root node/d' "$EDIT_FILE"
            echo "Removed root class from $EDIT_FILE."
          fi

      # ========================================================================
      # STEP 16: Set Ontology IRI to Directory Style
      # ========================================================================
      - name: Set Ontology IRI to Directory Style
        shell: bash
        run: |
          set -euo pipefail
          LOWER_ID=$(echo "${{ github.event.inputs.ontology_id }}" | tr '[:upper:]' '[:lower:]')
          EDIT_FILE="src/ontology/${LOWER_ID}-edit.owl"
          ONT_IRI="https://w3id.org/pmd/${LOWER_ID}/"
          
          if [ -f "$EDIT_FILE" ]; then
            robot annotate --input "$EDIT_FILE" \
              --ontology-iri "$ONT_IRI" \
              -o "$EDIT_FILE"
            echo "Ontology IRI set to: $ONT_IRI"
          fi

      # ========================================================================
      # STEP 17: Run QC and Update Repo
      # ========================================================================
      - name: Run QC and Update Repo
        shell: bash
        run: |
          set -euo pipefail
          echo "Running QC tests and repo update..."
          cd src/ontology
          make test ROBOT_ENV='ROBOT_JAVA_ARGS=-Xmx8G'
          make update_repo
          echo "QC passed; repo updated."

      # ========================================================================
      # STEP 18: Inject Shared Import and Annotations into All Components
      # CRITICAL: This runs AFTER all ODK operations to ensure changes persist
      #
      # FIX 1: Force ALL component OWL files to Manchester Syntax (ROBOT format: omn)
      # FIX 2: Ensure every {lower_id}-*.owl component imports {lower_id}-shared.owl
      #
      # Implementation notes:
      # - Normalize each components/*.owl to RDF/XML first (ROBOT format: owl) to enable safe XML edits
      # - Inject owl:imports + annotations onto owl:Ontology (works even if source was XML already)
      # - Convert back to Manchester (omn) and overwrite original file
      # ========================================================================
      # ========================================================================
      # STEP 18: Inject Shared Import and Annotations into All Components
      # CRITICAL: This runs AFTER all ODK operations to ensure changes persist
      #
      # FIX 1: Force ALL component OWL files to Manchester Syntax (ROBOT format: omn)
      # FIX 2: Ensure every {lower_id}-*.owl component imports {lower_id}-shared.owl
      #
      # Additional FIX (for your failure):
      # - Use catalog-v001.xml so ROBOT resolves imports locally instead of HTTP
      # - Run from src/ontology so catalog rewritePrefix paths resolve correctly
      # ========================================================================
      - name: Inject Shared Import and Annotations into Components
        shell: bash
        run: |
          set -euo pipefail
          ID="${{ github.event.inputs.ontology_id }}"
          LOWER_ID=$(echo "$ID" | tr '[:upper:]' '[:lower:]')
          UPPER_ID=$(echo "$ID" | tr '[:lower:]' '[:upper:]')
          ONTBASE="https://w3id.org/pmd/${LOWER_ID}"
          COMPBASE="${ONTBASE}/components"
          SHARED_IRI="${COMPBASE}/${LOWER_ID}-shared.owl"

          WORKDIR="src/ontology"
          COMPONENT_DIR="${WORKDIR}/components"
          CATALOG_FILE="${WORKDIR}/catalog-v001.xml"

          if [ ! -d "$COMPONENT_DIR" ]; then
            echo "ERROR: Component directory not found: $COMPONENT_DIR"
            exit 1
          fi

          if [ ! -f "$CATALOG_FILE" ]; then
            echo "ERROR: Catalog file not found: $CATALOG_FILE"
            exit 1
          fi

          echo "Injecting shared imports and annotations into component files + converting to Manchester syntax..."
          echo "Using catalog: $CATALOG_FILE"

          # Run from src/ontology so catalog rewritePrefix resolves to ./components and ./imports
          cd "$WORKDIR"

          python3 << PYEOF
          import shutil
          import subprocess
          import xml.etree.ElementTree as ET
          from pathlib import Path
          import tempfile

          lower_id = "$LOWER_ID"
          upper_id = "$UPPER_ID"
          shared_iri = "$SHARED_IRI"

          catalog_file = Path("catalog-v001.xml").resolve()
          component_dir = Path("components")

          OWL  = "http://www.w3.org/2002/07/owl#"
          RDF  = "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
          RDFS = "http://www.w3.org/2000/01/rdf-schema#"
          DCT  = "http://purl.org/dc/terms/"
          XML  = "http://www.w3.org/XML/1998/namespace"

          ET.register_namespace("owl", OWL)
          ET.register_namespace("rdf", RDF)
          ET.register_namespace("rdfs", RDFS)
          ET.register_namespace("dcterms", DCT)

          # Infrastructure files: keep Manchester normalization, but do NOT inject shared import/annotations
          skip_files = {
              "imports-edit.owl",
              f"{lower_id}-shared.owl",
              f"{lower_id}-axioms-shared.owl",
          }

          def run_robot(args):
              # ROBOT global options must come before the command (convert)
              cmd = ["robot", "--catalog", str(catalog_file)] + args
              p = subprocess.run(cmd, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True)
              if p.returncode != 0:
                  print(p.stdout)
                  raise RuntimeError(f"ROBOT failed: {' '.join(cmd)}")
              return p.stdout

          def ensure_import_and_annotations_rdfxml(rdfxml_path: Path, is_component_module: bool, comp_pretty: str):
              tree = ET.parse(rdfxml_path)
              root = tree.getroot()

              onto = root.find(f".//{{{OWL}}}Ontology")
              if onto is None:
                  raise RuntimeError(f"Could not find owl:Ontology in {rdfxml_path}")

              if is_component_module:
                  # Ensure owl:imports shared_iri
                  found = False
                  for imp in onto.findall(f"{{{OWL}}}imports"):
                      if imp.get(f"{{{RDF}}}resource") == shared_iri:
                          found = True
                          break
                  if not found:
                      imp_el = ET.SubElement(onto, f"{{{OWL}}}imports")
                      imp_el.set(f"{{{RDF}}}resource", shared_iri)

                  # Ensure title
                  has_title = any(child.tag == f"{{{DCT}}}title" for child in list(onto))
                  if not has_title:
                      title_el = ET.SubElement(onto, f"{{{DCT}}}title")
                      title_el.set(f"{{{XML}}}lang", "en")
                      title_el.text = f"{upper_id} - {comp_pretty} Module"

                  # Ensure comment
                  has_comment = any(child.tag == f"{{{RDFS}}}comment" for child in list(onto))
                  if not has_comment:
                      comment_el = ET.SubElement(onto, f"{{{RDFS}}}comment")
                      comment_el.set(f"{{{XML}}}lang", "en")
                      comment_el.text = f"The {comp_pretty.lower()} module of the {upper_id} Ontology."

              tree.write(rdfxml_path, encoding="UTF-8", xml_declaration=True)

          def is_real_component_module(owl_file: Path) -> bool:
              if owl_file.name in skip_files:
                  return False
              if not owl_file.name.startswith(f"{lower_id}-"):
                  return False
              return True

          def pretty_component_name(owl_file: Path) -> str:
              comp_name = owl_file.stem[len(f"{lower_id}-"):]
              return comp_name.replace("_", " ").replace("-", " ").title()

          owl_files = sorted(component_dir.glob("*.owl"))
          if not owl_files:
              print("No OWL files found in components directory; nothing to do.")
              raise SystemExit(0)

          with tempfile.TemporaryDirectory(prefix="components-fix-") as td:
              tmpdir = Path(td)

              for owl_file in owl_files:
                  component_module = is_real_component_module(owl_file)
                  comp_pretty = pretty_component_name(owl_file) if component_module else ""

                  print(f"  Processing: {owl_file.name}")
                  if component_module:
                      print(f"    Component module detected; ensuring shared import + annotations: {comp_pretty}")
                  else:
                      print(f"    Infrastructure/non-module; Manchester normalization only")

                  # 1) Normalize to RDF/XML using the catalog (prevents HTTP import failures)
                  tmp_rdfxml = tmpdir / f"{owl_file.name}.rdfxml.owl"
                  run_robot(["convert", "--input", str(owl_file), "--format", "owl", "--output", str(tmp_rdfxml)])

                  # 2) Inject shared import + annotations (for component modules only)
                  ensure_import_and_annotations_rdfxml(tmp_rdfxml, component_module, comp_pretty)

                  # 3) Convert to Manchester syntax and overwrite original
                  tmp_omn = tmpdir / f"{owl_file.name}.omn.owl"
                  run_robot(["convert", "--input", str(tmp_rdfxml), "--format", "omn", "--output", str(tmp_omn)])

                  shutil.move(str(tmp_omn), str(owl_file))
                  print(f"    Wrote Manchester: {owl_file.name}")

          print("Component injection + Manchester normalization complete.")
          PYEOF


      # ========================================================================
      # STEP 19: Final Validation
      # ========================================================================
      - name: Final Validation
        shell: bash
        run: |
          set -euo pipefail
          ID="${{ github.event.inputs.ontology_id }}"
          LOWER_ID=$(echo "$ID" | tr '[:upper:]' '[:lower:]')
          
          echo "=== Final Validation ==="
          echo ""
          echo "--- imports-edit.owl ---"
          head -20 src/ontology/components/imports-edit.owl
          echo ""
          echo "--- ${LOWER_ID}-shared.owl ---"
          cat src/ontology/components/${LOWER_ID}-shared.owl
          echo ""
          echo "--- ${LOWER_ID}-axioms-shared.owl ---"
          cat src/ontology/components/${LOWER_ID}-axioms-shared.owl
          echo ""
          echo "--- Sample component file ---"
          FIRST_COMP=$(ls src/ontology/components/${LOWER_ID}-*.owl 2>/dev/null | grep -v shared | grep -v axioms | head -1)
          if [ -n "$FIRST_COMP" ]; then
            echo "File: $FIRST_COMP"
            head -25 "$FIRST_COMP"
          fi
          echo ""
          echo "=== Validation Complete ==="

      # ========================================================================
      # STEP 20: Cleanup Temporary Files
      # ========================================================================
      - name: Cleanup Temporary Files
        shell: bash
        run: |
          set -euo pipefail
          echo "Cleaning up temporary workflow files..."
          rm -rf .workflow-temp
          echo "Cleanup complete."

      # ========================================================================
      # STEP 21: Commit and Push Changes
      # ========================================================================
      - name: Commit and Push Changes
        shell: bash
        run: |
          set -euo pipefail
          LOWER_ID=$(echo "${{ github.event.inputs.ontology_id }}" | tr '[:upper:]' '[:lower:]')
          UPPER_ID=$(echo "${{ github.event.inputs.ontology_id }}" | tr '[:lower:]' '[:upper:]')
          
          git add .
          git reset .github 2>/dev/null || true
          
          git commit -m "chore: Initial seed setup of ${UPPER_ID} ontology

          Auto-generated via Setup New Ontology workflow:
          - Configured project-odk.yaml (URIs: https://w3id.org/pmd/${LOWER_ID}/)
          - imports-edit.owl imports all *_import.owl modules
          - ${LOWER_ID}-shared.owl imports imports-edit.owl
          - Each ${LOWER_ID}-{component}.owl imports ${LOWER_ID}-shared.owl with annotations
          - ${LOWER_ID}-axioms-shared.owl imports ALL unique components (no duplicates)
          - Generated ${LOWER_ID}-edit.owl and ${LOWER_ID}-idranges.owl" || echo "No changes to commit"
                    
          git push origin HEAD:${{ github.ref_name }}
          echo "Changes committed and pushed."

      # ========================================================================
      # STEP 22: Trigger Workflow Chain
      # ========================================================================
      - name: Trigger Quality Control Workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: trigger-qc
